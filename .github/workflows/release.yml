name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Python backend deps + PyInstaller
        working-directory: backend
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Bundle Python backend
        working-directory: backend
        run: pyinstaller nexus_backend.spec --distpath ../frontend/bundled-backend --workpath /tmp/pyibuild --noconfirm

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build macOS DMG
        working-directory: frontend
        run: npm run build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-build
          path: dist-app/*.dmg

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Python backend deps + PyInstaller
        working-directory: backend
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Bundle Python backend
        working-directory: backend
        run: pyinstaller nexus_backend.spec --distpath ..\frontend\bundled-backend --workpath C:\Temp\pyibuild --noconfirm

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build Windows installer
        working-directory: frontend
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: win-build
          path: dist-app/*.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Python backend deps + PyInstaller
        working-directory: backend
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Bundle Python backend
        working-directory: backend
        run: pyinstaller nexus_backend.spec --distpath ../frontend/bundled-backend --workpath /tmp/pyibuild --noconfirm

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build Linux AppImage
        working-directory: frontend
        run: npm run build:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: dist-app/*.AppImage

  release:
    needs: [build-mac, build-win, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: NEXUS ULTRA ${{ github.ref_name }}
          body: |
            ## NEXUS ULTRA ${{ github.ref_name }}

            AI-powered cybersecurity platform — 12 elite agents, free cloud AI, Kali Linux Docker, full OSINT.

            **No prerequisites** — Python is bundled inside the installer.

            ### Downloads
            | Platform | File |
            |----------|------|
            | macOS (Apple Silicon + Intel) | `NEXUS ULTRA-*-mac.dmg` |
            | Windows 10/11 | `NEXUS ULTRA Setup *.exe` |
            | Linux | `NEXUS ULTRA-*.AppImage` |

            ### macOS — "cannot verify" warning
            The app is not signed with an Apple certificate. To open it:
            - **Right-click → Open** → click Open in the dialog (easiest, one-time)
            - **Or run in Terminal:** `xattr -cr "/Applications/NEXUS ULTRA.app"`
            - **Or:** System Settings → Privacy & Security → Open Anyway

            ### Optional (for enhanced features)
            - **Docker** — Kali Linux integration
            - **Ollama** — local AI models ([ollama.com](https://ollama.com))
            - **Groq API key** — free 800 tok/s cloud AI ([console.groq.com](https://console.groq.com))
            - **Gemini API key** — free 1M tokens/day ([aistudio.google.com](https://aistudio.google.com/app/apikey))

            ### First Launch
            The onboarding wizard guides you through AI engine setup.
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.exe
            artifacts/**/*.AppImage
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
