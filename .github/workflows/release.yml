name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Build macOS DMG
        working-directory: frontend
        run: npm run build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-build
          path: dist-app/*.dmg

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Build Windows installer
        working-directory: frontend
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: win-build
          path: dist-app/*.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Build Linux AppImage
        working-directory: frontend
        run: npm run build && npx electron-builder --linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: dist-app/*.AppImage

  release:
    needs: [build-mac, build-win, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: NEXUS ULTRA ${{ github.ref_name }}
          body: |
            ## NEXUS ULTRA ${{ github.ref_name }}

            AI-powered cybersecurity platform with 12 elite agents, Groq/Gemini free AI, Kali Linux Docker integration, and full OSINT capabilities.

            ### Downloads
            | Platform | File |
            |----------|------|
            | macOS (Apple Silicon + Intel) | `NEXUS ULTRA-*-mac.dmg` |
            | Windows 10/11 | `NEXUS ULTRA Setup *.exe` |
            | Linux | `NEXUS ULTRA-*.AppImage` |

            ### Requirements
            - **Python 3.10+** must be installed ([python.org](https://python.org))
            - **Ollama** for free local AI ([ollama.com](https://ollama.com)) — optional
            - **Groq API key** for free cloud AI ([console.groq.com](https://console.groq.com)) — optional

            ### First Launch
            The app will auto-install Python dependencies on first run.
            Follow the onboarding wizard to configure your AI engine.
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.exe
            artifacts/**/*.AppImage
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
